<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskPane — Vanilla JS</title>
  <link rel="stylesheet" href="../shared/base.css" />
  <link id="dp-theme" rel="stylesheet" href="../../dist/themes/dark.css" />
  <style>
    /* ── Sidebar layout ── */
    .d-sidebar { width: 220px; }

    /* ── API Console ── */
    .api-row {
      display: flex; gap: 4px; margin-bottom: 6px;
    }
    .api-row select, .api-row input {
      flex: 1; padding: 5px 8px; border-radius: 6px;
      border: 1px solid var(--d-border2);
      background: var(--d-panel2); color: var(--d-text);
      font-size: 12px; font-family: var(--d-font);
    }

    /* ── Log sidebar section ── */
    .sidebar-log {
      height: 160px;
      border-top: 1px solid var(--d-border);
      padding: 8px 10px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 10px;
      flex-shrink: 0;
    }
    .log-line { color: rgba(34,197,94,.85); padding: 1px 0; }
    .log-line.ev-close { color: rgba(239,68,68,.8); }
    .log-line.ev-focus { color: rgba(59,130,246,.85); }
    .log-line.ev-move, .log-line.ev-resize { color: rgba(245,158,11,.8); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="dh">
  <a class="dh-back" href="../index.html">← Demo</a>
  <span class="dh-logo">🖥</span>
  <span class="dh-title">Vanilla JS</span>
  <span class="dh-badge b-js">JavaScript</span>
  <div class="dh-sep"></div>
  <div class="dh-actions">
    <button class="d-btn" id="btn-theme">🌙 暗色</button>
    <button class="d-btn" id="btn-destroy">💣 關閉全部</button>
  </div>
</header>

<!-- ── Layout ── -->
<div class="d-layout">

  <!-- 左側邊欄 -->
  <aside class="d-sidebar">
    <div class="d-sidebar-scroll">
      <div class="d-section-title">應用程式</div>

      <button class="d-app-btn" data-app="welcome">
        <span class="icon">🖥</span><span class="label">功能介紹</span>
      </button>
      <button class="d-app-btn" data-app="editor">
        <span class="icon">📝</span><span class="label">文字視窗</span>
      </button>
      <button class="d-app-btn" data-app="snap">
        <span class="icon">⚡</span><span class="label">Snap 吸附</span>
      </button>
      <button class="d-app-btn" data-app="console">
        <span class="icon">🎛</span><span class="label">API 控制台</span>
      </button>
      <button class="d-app-btn" data-app="counter">
        <span class="icon">🔢</span><span class="label">Keep-Alive 計數器</span>
      </button>
      <button class="d-app-btn" data-app="dialog">
        <span class="icon">🔒</span><span class="label">固定大小對話框</span>
      </button>

      <div class="d-section-title" style="margin-top:12px">API 控制台</div>
      <div class="api-row">
        <select id="api-target"><option value="">-- 選擇視窗 --</option></select>
      </div>
      <div class="api-row">
        <button class="d-btn" style="flex:1" id="api-minimize">最小化</button>
        <button class="d-btn" style="flex:1" id="api-maximize">最大化</button>
      </div>
      <div class="api-row">
        <button class="d-btn" style="flex:1" id="api-restore">還原</button>
        <button class="d-btn" style="flex:1" id="api-focus">置頂</button>
      </div>
      <div class="api-row">
        <input id="api-title-input" placeholder="新標題..." />
      </div>
      <div class="api-row">
        <button class="d-btn d-btn-accent" style="flex:1" id="api-set-title">setTitle</button>
        <button class="d-btn" style="flex:1" id="api-close">close</button>
      </div>
    </div>

    <!-- 事件 Log -->
    <div class="sidebar-log" id="event-log">
      <div class="log-line">📡 Event Log</div>
    </div>
  </aside>

  <!-- 視窗畫布 -->
  <div class="d-canvas" id="canvas"></div>
</div>

<script type="module">
  import { WindowManager, setTheme } from '../../dist/deskpane.es.js';

  const canvas = document.getElementById('canvas');
  const wm = new WindowManager({ container: canvas, isolated: true, snap: true });

  // ── 事件 Log ────────────────────────────────────────────
  const log = document.getElementById('event-log');
  const CLASS = {
    'window:closed': 'ev-close',
    'window:focused': 'ev-focus',
    'window:moved': 'ev-move',
    'window:resized': 'ev-resize',
  };
  const ALL_EVENTS = [
    'window:opened','window:closed','window:focused',
    'window:minimized','window:maximized','window:restored',
    'window:moved','window:resized',
  ];
  ALL_EVENTS.forEach(ev => {
    wm.events.on(ev, d => {
      const el = document.createElement('div');
      el.className = 'log-line ' + (CLASS[ev] || '');
      el.textContent = `${new Date().toLocaleTimeString('zh-TW',{hour12:false})} ${ev.replace('window:','')} [${d?.id ?? ''}]`;
      log.insertBefore(el, log.firstChild);
      if (log.children.length > 60) log.lastChild.remove();
      refreshApiSelect();
      refreshAppDots();
    });
  });

  // ── API Select sync ─────────────────────────────────────
  const apiTarget = document.getElementById('api-target');
  function refreshApiSelect() {
    const cur = apiTarget.value;
    apiTarget.innerHTML = '<option value="">-- 選擇視窗 --</option>';
    wm.getWindowIds().forEach(id => {
      const s = wm.getState(id);
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = s?.title ?? id;
      if (id === cur) opt.selected = true;
      apiTarget.appendChild(opt);
    });
  }

  // ── Dot on sidebar buttons ──────────────────────────────
  function refreshAppDots() {
    document.querySelectorAll('.d-app-btn[data-app]').forEach(btn => {
      const id = btn.dataset.app;
      const open = wm.getWindowIds().includes(id);
      btn.classList.toggle('active', open);
      let dot = btn.querySelector('.d-app-dot');
      if (open && !dot) {
        dot = document.createElement('span');
        dot.className = 'd-app-dot';
        btn.appendChild(dot);
      } else if (!open && dot) {
        dot.remove();
      }
    });
  }

  // ── App 內容工廠 ────────────────────────────────────────
  function el(html) {
    const d = document.createElement('div');
    d.style.cssText = 'width:100%;height:100%;overflow:auto';
    d.innerHTML = html;
    return d;
  }

  const APPS = {
    welcome: {
      title: '🖥 功能介紹', width: 460, height: 360, x: 30, y: 20,
      content: () => el(`
        <div style="padding:24px;line-height:1.8;font-family:system-ui">
          <h2 style="margin:0 0 12px;font-size:17px;color:#60a5fa">DeskPane 功能總覽</h2>
          <div style="display:grid;gap:6px;font-size:13px">
            <div>🖱 <strong>拖曳 / 縮放</strong> — 拖曳標題列移動，拖曳邊框縮放</div>
            <div>⚡ <strong>Snap 吸附</strong> — 拖曳靠近邊緣自動對齊，顯示藍色 guide</div>
            <div>🔼 <strong>最小化 / 最大化</strong> — 點擊視窗按鈕或使用 API</div>
            <div>🔒 <strong>Keep-Alive</strong> — 最小化後 DOM 不銷毀，狀態完整保留</div>
            <div>📡 <strong>EventBus</strong> — 訂閱 opened / closed / moved 等事件</div>
            <div>🎨 <strong>主題切換</strong> — light / dark CSS 變數，右上角可切換</div>
          </div>
          <p style="margin-top:16px;font-size:12px;color:#94a3b8">
            左側選單開啟各個 Demo 視窗 👈<br/>
            拖曳此視窗靠近邊框，看 Snap 吸附效果 ⚡
          </p>
        </div>`)
    },
    editor: {
      title: '📝 文字視窗', width: 420, height: 320, x: 80, y: 60,
      content: () => {
        const d = document.createElement('div');
        d.style.cssText = 'display:flex;flex-direction:column;height:100%;padding:12px;gap:8px';
        d.innerHTML = `
          <div style="font-size:11px;color:#94a3b8">拖曳標題列移動 · 拖曳邊框縮放 · 最小化後文字不會消失</div>
          <textarea style="flex:1;width:100%;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.04);color:#e2e8f0;font-size:13px;font-family:monospace;
            resize:none;outline:none" placeholder="在此輸入文字...
最小化後再還原，內容完整保留 ✓"></textarea>`;
        return d;
      }
    },
    snap: {
      title: '⚡ Snap 吸附 Demo', width: 340, height: 260, x: 130, y: 100,
      content: () => el(`
        <div style="padding:20px;line-height:1.9;font-size:13px">
          <h3 style="margin:0 0 12px;color:#f59e0b;font-size:15px">⚡ Snap 吸附說明</h3>
          <p>拖曳這個視窗，當它靠近以下位置時會自動吸附並顯示藍色導引線：</p>
          <ul style="padding-left:18px;margin-top:8px;color:#94a3b8">
            <li>畫布左 / 右 / 上 / 下邊緣</li>
            <li>其他視窗的邊緣</li>
          </ul>
          <p style="margin-top:12px;font-size:11px;color:#64748b">
            感應閾值預設 20px，可透過 <code>snapThreshold</code> 選項調整。
          </p>
        </div>`)
    },
    console: {
      title: '🎛 API 控制台', width: 400, height: 300, x: 180, y: 60,
      content: () => el(`
        <div style="padding:20px;line-height:1.9;font-size:13px">
          <h3 style="margin:0 0 8px;color:#a78bfa;font-size:15px">🎛 API 控制台</h3>
          <p>使用左側側欄的「API 控制台」即時呼叫：</p>
          <ul style="padding-left:18px;margin-top:8px;color:#94a3b8;font-size:12px">
            <li><code>wm.minimize(id)</code> — 最小化</li>
            <li><code>wm.maximize(id)</code> — 最大化</li>
            <li><code>wm.restore(id)</code> — 還原</li>
            <li><code>wm.focus(id)</code> — 置頂</li>
            <li><code>wm.setTitle(id, title)</code> — 更新標題</li>
            <li><code>wm.close(id)</code> — 關閉</li>
          </ul>
        </div>`)
    },
    counter: {
      title: '🔢 Keep-Alive 計數器', width: 280, height: 220, x: 230, y: 100,
      content: () => {
        const d = document.createElement('div');
        d.style.cssText = 'padding:28px;text-align:center;font-family:system-ui';
        let count = 0;
        const num = document.createElement('div');
        num.style.cssText = 'font-size:56px;font-weight:700;color:#3b82f6;line-height:1;margin-bottom:16px';
        num.textContent = '0';
        const btn = document.createElement('button');
        btn.textContent = '+ 計數';
        btn.style.cssText = 'padding:10px 28px;font-size:14px;border-radius:8px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-family:system-ui';
        btn.onclick = () => { num.textContent = String(++count); };
        const note = document.createElement('p');
        note.style.cssText = 'font-size:11px;color:#64748b;margin-top:12px';
        note.textContent = '最小化再還原，計數不會重置 ✓';
        d.append(num, btn, note);
        return d;
      }
    },
    dialog: {
      title: '🔒 固定大小對話框', width: 360, height: 200, x: 160, y: 140,
      content: () => {
        const d = document.createElement('div');
        d.style.cssText = 'padding:28px 24px;font-family:system-ui;display:flex;flex-direction:column;gap:14px;height:100%;box-sizing:border-box';
        d.innerHTML = `
          <p style="font-size:14px;line-height:1.7;margin:0">
            此視窗設定了 <code style="background:rgba(255,255,255,0.12);padding:2px 6px;border-radius:4px">resizable: false</code>。<br>
            試著拖曳邊框縮放，或點擊中間按鈕——兩者皆無效。
          </p>
          <div style="display:flex;justify-content:flex-end;gap:8px">
            <button id="dlg-cancel" style="padding:6px 18px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:inherit;cursor:pointer;font-size:13px">取消</button>
            <button style="padding:6px 18px;border-radius:6px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-size:13px">確認</button>
          </div>`;
        d.querySelector('#dlg-cancel').addEventListener('click', () => wm.close('dialog'));
        return d;
      },
      resizable: false,
    },
  };

  // ── App 開啟 ────────────────────────────────────────────
  document.querySelectorAll('.d-app-btn[data-app]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.app;
      const app = APPS[id];
      if (!app) return;
      wm.open({ id, title: app.title, width: app.width, height: app.height, x: app.x, y: app.y, resizable: app.resizable, content: app.content() });
    });
  });

  // ── API console ─────────────────────────────────────────
  document.getElementById('api-minimize').onclick  = () => { const id = apiTarget.value; if(id) wm.minimize(id); };
  document.getElementById('api-maximize').onclick  = () => { const id = apiTarget.value; if(id) wm.maximize(id); };
  document.getElementById('api-restore').onclick   = () => { const id = apiTarget.value; if(id) wm.restore(id); };
  document.getElementById('api-focus').onclick     = () => { const id = apiTarget.value; if(id) wm.focus(id); };
  document.getElementById('api-close').onclick     = () => { const id = apiTarget.value; if(id) wm.close(id); };
  document.getElementById('api-set-title').onclick = () => {
    const id = apiTarget.value;
    const title = document.getElementById('api-title-input').value.trim();
    if (id && title) { wm.setTitle(id, title); refreshApiSelect(); }
  };

  // ── 主題切換 ────────────────────────────────────────────
  let darkMode = true;
  const btnTheme = document.getElementById('btn-theme');
  btnTheme.addEventListener('click', () => {
    darkMode = !darkMode;
    setTheme(darkMode ? 'dark' : 'light', { basePath: '../../dist/themes' });
    btnTheme.textContent = darkMode ? '🌙 暗色' : '☀️ 亮色';
  });

  document.getElementById('btn-destroy').onclick = () => {
    wm.destroy(); refreshApiSelect(); refreshAppDots();
  };

  // ── 初始開啟 welcome ────────────────────────────────────
  wm.open({ id: 'welcome', title: APPS.welcome.title, width: APPS.welcome.width, height: APPS.welcome.height, x: APPS.welcome.x, y: APPS.welcome.y, content: APPS.welcome.content() });
</script>
</body>
</html>
