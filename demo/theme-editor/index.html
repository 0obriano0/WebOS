<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskPane Theme Editor</title>
  <link rel="stylesheet" href="../shared/base.css" />
  <style>
    body {
      overflow: hidden; height: 100vh;
      display: flex; flex-direction: column;
      padding-top: var(--d-header-h);
    }
    .te-body { display: flex; flex: 1; overflow: hidden; }

    /* ── Left panel ───────────────────────────────────── */
    .te-left {
      width: 340px; flex-shrink: 0;
      background: var(--d-panel); border-right: 1px solid var(--d-border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Mode toggle ──────────────────────────────────── */
    .mode-toggle {
      display: flex; gap: 2px; padding: 8px 8px 0;
      border-bottom: 1px solid var(--d-border); flex-shrink: 0;
    }
    .mode-btn {
      flex: 1; padding: 6px 10px; border-radius: 6px 6px 0 0;
      border: 1px solid transparent; border-bottom: none;
      background: transparent; color: var(--d-text-dim);
      font-size: 12px; font-weight: 500; cursor: pointer;
      position: relative; bottom: -1px; transition: .15s;
    }
    .mode-btn:hover { background: rgba(255,255,255,.05); color: var(--d-text); }
    .mode-btn.active {
      background: var(--d-bg); color: var(--d-text);
      border-color: var(--d-border); border-bottom-color: var(--d-bg);
    }

    /* ── Editor panels ────────────────────────────────── */
    .te-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .te-panel.active { display: flex; }

    /* ── CSS var editor ───────────────────────────────── */
    .editor-scroll { flex: 1; overflow-y: auto; padding: 10px 10px; }
    .editor-scroll::-webkit-scrollbar { width: 5px; }
    .editor-scroll::-webkit-scrollbar-track { background: transparent; }
    .editor-scroll::-webkit-scrollbar-thumb { background: var(--d-border); border-radius: 3px; }

    .var-group { margin-bottom: 14px; }
    .var-group-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: rgba(226,232,240,.45);
      margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--d-border);
    }
    .var-row {
      display: grid; grid-template-columns: 1fr auto;
      align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .var-label {
      font-size: 11px; color: rgba(226,232,240,.55);
      font-family: 'Consolas','Fira Code',monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .var-label[title] { cursor: help; }
    .var-inputs { display: flex; align-items: center; gap: 5px; }
    .var-preview {
      width: 24px; height: 24px; flex-shrink: 0;
      border-radius: 4px; border: 1px solid rgba(255,255,255,.14); cursor: default;
    }
    .var-section-sep {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: rgba(139,92,246,.6);
      padding: 10px 0 6px; border-top: 1px solid rgba(139,92,246,.25); margin-top: 8px;
    }

    input[type="color"] {
      width: 28px; height: 24px; border: 1px solid rgba(255,255,255,.12);
      border-radius: 4px; background: rgba(255,255,255,.05);
      cursor: pointer; padding: 2px; flex-shrink: 0;
    }
    input[type="text"].hex-input {
      width: 76px; padding: 3px 6px;
      border: 1px solid rgba(255,255,255,.12); border-radius: 4px;
      background: rgba(255,255,255,.05); color: var(--d-text);
      font-size: 11px; font-family: 'Consolas','Fira Code',monospace; outline: none;
    }
    input[type="text"].text-input {
      width: 140px; padding: 3px 6px;
      border: 1px solid rgba(255,255,255,.12); border-radius: 4px;
      background: rgba(255,255,255,.05); color: var(--d-text);
      font-size: 11px; font-family: 'Consolas','Fira Code',monospace; outline: none;
    }
    input[type="text"].rgba-input {
      width: 155px; padding: 3px 6px;
      border: 1px solid rgba(255,255,255,.12); border-radius: 4px;
      background: rgba(255,255,255,.05); color: var(--d-text);
      font-size: 11px; font-family: 'Consolas','Fira Code',monospace; outline: none;
    }
    input[type="text"]:focus, input[type="color"]:focus { border-color: var(--d-accent); }
    .rgba-input:focus { border-color: var(--d-accent); }

    /* Format toggle + alpha input */
    .color-fmt-btn {
      padding: 1px 5px; border-radius: 3px; border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06); color: rgba(226,232,240,.5);
      font-size: 9px; font-weight: 700; cursor: pointer; letter-spacing: .5px;
      line-height: 1.6; transition: .12s; flex-shrink: 0; user-select: none;
    }
    .color-fmt-btn:hover { background: rgba(255,255,255,.12); color: var(--d-text); }
    .alpha-input {
      width: 44px; padding: 3px 4px; text-align: center;
      border: 1px solid rgba(255,255,255,.12); border-radius: 4px;
      background: rgba(255,255,255,.05); color: var(--d-text);
      font-size: 11px; font-family: 'Consolas','Fira Code',monospace; outline: none;
      -moz-appearance: textfield;
    }
    .alpha-input::-webkit-inner-spin-button, .alpha-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .alpha-input:focus { border-color: var(--d-accent); }

    /* ── Export panel ─────────────────────────────────── */
    .export-panel {
      border-top: 1px solid var(--d-border); padding: 8px 10px; flex-shrink: 0;
    }
    .export-panel-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(226,232,240,.45); margin-bottom: 7px;
    }
    .export-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .copy-feedback { font-size: 11px; color: #22c55e; margin-top: 5px; min-height: 15px; transition: opacity .3s; }

    /* ── Right: preview panel ─────────────────────────── */
    .te-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .preview-toolbar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 6px 12px; flex-shrink: 0;
      background: var(--d-panel); border-bottom: 1px solid var(--d-border);
    }
    .preview-toggle { display: flex; gap: 2px; flex-shrink: 0; }
    .preview-btn {
      padding: 4px 14px; border-radius: 5px;
      border: 1px solid var(--d-border); background: transparent;
      color: var(--d-text-dim); font-size: 11px; cursor: pointer; transition: .15s;
    }
    .preview-btn:hover { color: var(--d-text); background: rgba(255,255,255,.04); }
    .preview-btn.active { background: var(--d-bg); color: var(--d-text); }
    .bg-select {
      padding: 3px 8px; border: 1px solid rgba(255,255,255,.12); border-radius: 4px;
      background: rgba(255,255,255,.05); color: var(--d-text); font-size: 11px; cursor: pointer;
    }
    .preview-area { flex: 1; overflow: hidden; position: relative; background: #0b0f1a; }
    .preview-sub { position: absolute; inset: 0; display: none; }
    .preview-sub.active { display: block; }

    /* Window preview backgrounds */
    #core-preview-area { width: 100%; height: 100%; position: relative; overflow: hidden; }
    #core-preview-area.bg-dark  { background: #0b0f1a; }
    #core-preview-area.bg-light { background: #e8eaf0; }
    #core-preview-area.bg-grid  {
      background-color: #0b0f1a;
      background-image: linear-gradient(rgba(59,130,246,.07) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(59,130,246,.07) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    #core-preview-area .dp-window { position: absolute !important; }

    /* Desktop preview */
    #desktop-preview-area { width: 100%; height: 100%; position: relative; overflow: hidden; }

    /* ── Advanced (CFE) panel ─────────────────────────── */
    .cfe-file-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; border-bottom: 1px solid var(--d-border); flex-shrink: 0;
      background: rgba(0,0,0,.15);
    }
    .cfe-file-btn {
      padding: 4px 12px; border-radius: 4px; border: 1px solid transparent;
      background: transparent; color: var(--d-text-dim); font-size: 11px;
      font-family: 'Consolas','Fira Code',monospace; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .cfe-file-btn:hover { background: rgba(255,255,255,.07); color: var(--d-text); }
    .cfe-file-btn.active {
      background: rgba(20,184,166,.18); color: #5eead4;
      border-color: rgba(20,184,166,.4);
    }
    .cfe-file-sep { flex: 1; }
    .cfe-status {
      font-size: 10px; color: rgba(226,232,240,.35);
      font-family: 'Consolas','Fira Code',monospace;
    }
    .cfe-preset-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      padding: 5px 10px; border-bottom: 1px solid var(--d-border); flex-shrink: 0;
      background: rgba(0,0,0,.1);
    }
    .cfe-preset-label { font-size: 10px; color: var(--d-text-dim); white-space: nowrap; }
    .cfe-preset-btn {
      padding: 3px 10px; border-radius: 4px; border: 1px solid transparent;
      background: transparent; color: var(--d-text-dim); font-size: 11px; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .cfe-preset-btn:hover { background: rgba(255,255,255,.07); color: var(--d-text); }
    .cfe-preset-btn.active {
      background: rgba(99,102,241,.2); color: #a5b4fc;
      border-color: rgba(99,102,241,.35);
    }
    .cfe-editor-wrap { flex: 1; display: flex; overflow: hidden; position: relative; }
    .cfe-line-nums {
      width: 36px; flex-shrink: 0; overflow: hidden;
      background: rgba(0,0,0,.2); border-right: 1px solid rgba(255,255,255,.05);
      padding: 10px 0; text-align: right;
      font-size: 11px; line-height: 1.55; font-family: 'Consolas','Fira Code',monospace;
      color: rgba(226,232,240,.2); user-select: none;
    }
    .cfe-line-nums span { display: block; padding-right: 8px; }
    .cfe-textarea {
      flex: 1; resize: none; box-sizing: border-box; overflow: auto;
      background: transparent; border: none;
      color: #a5f3fc; font-size: 11px;
      font-family: 'Consolas','Fira Code',monospace;
      padding: 10px 12px; outline: none; line-height: 1.55;
      white-space: pre; overflow-wrap: normal; tab-size: 2;
    }
    .cfe-toolbar {
      display: flex; align-items: center; gap: 6px; padding: 7px 10px;
      border-top: 1px solid var(--d-border); flex-shrink: 0;
      background: rgba(0,0,0,.1);
    }
    .cfe-feedback { font-size: 11px; color: #22c55e; min-height: 14px; transition: opacity .3s; margin-left: 6px; }
  </style>
</head>
<body>

<header class="dh">
  <a class="dh-back" href="../index.html">← Demo</a>
  <span class="dh-logo">🎨</span>
  <span class="dh-title">Theme Editor</span>
  <span class="dh-badge b-tool">Dev Tool</span>
  <div class="dh-sep"></div>
  <div class="dh-actions" style="gap:6px">
    <span style="font-size:11px;color:rgba(226,232,240,.4);margin-right:2px">主題：</span>
    <select id="theme-select" class="bg-select" style="min-width:155px;font-size:12px"></select>
    <button class="d-btn d-btn-accent" id="btn-save-theme" title="儲存目前設定為自訂主題">💾 儲存</button>
    <button class="d-btn" id="btn-delete-theme" title="刪除此自訂主題" style="color:#fca5a5;display:none">🗑</button>
  </div>
</header>

<div class="te-body">

  <!-- LEFT: editor -->
  <div class="te-left">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="basic">🎨 基礎</button>
      <button class="mode-btn" data-mode="advanced">🔧 進階 CSS</button>
    </div>

    <!-- Basic: CSS var editor (core + desktop combined) -->
    <div class="te-panel active" id="panel-basic">
      <div class="editor-scroll" id="var-editor-scroll"></div>
      <div class="export-panel">
        <div class="export-panel-title">📤 匯出主題 CSS 變數</div>
        <div class="export-btns">
          <button class="d-btn d-btn-accent" id="btn-copy-all">📋 全部</button>
          <button class="d-btn" id="btn-copy-core">Core</button>
          <button class="d-btn" id="btn-copy-desktop">Desktop</button>
          <button class="d-btn" id="btn-dl-all">💾 下載</button>
        </div>
        <div class="copy-feedback" id="copy-feedback"></div>
      </div>
    </div>

    <!-- Advanced: raw CSS editor -->
    <div class="te-panel" id="panel-advanced">
      <div class="cfe-file-bar">
        <button class="cfe-file-btn active" id="cfe-btn-core" onclick="cfeLoad('core')">deskpane.css</button>
        <button class="cfe-file-btn" id="cfe-btn-desktop" onclick="cfeLoad('desktop')">deskpane-desktop.css</button>
        <div class="cfe-file-sep"></div>
        <span class="cfe-status" id="cfe-status">—</span>
      </div>
      <div class="cfe-preset-bar">
        <span class="cfe-preset-label">快速載入：</span>
        <button class="cfe-preset-btn active" id="cfe-preset-default" onclick="cfeLoadPreset('default')">🎨 預設</button>
        <button class="cfe-preset-btn" id="cfe-preset-win11" onclick="cfeLoadPreset('win11')">🪟 Win11</button>
      </div>
      <div class="cfe-editor-wrap">
        <div class="cfe-line-nums" id="cfe-line-nums"></div>
        <textarea class="cfe-textarea" id="cfe-textarea" spellcheck="false"></textarea>
      </div>
      <div class="cfe-toolbar">
        <button class="d-btn d-btn-accent" id="cfe-btn-apply">▶ 套用</button>
        <button class="d-btn" id="cfe-btn-reset">↩ 重置</button>
        <button class="d-btn" id="cfe-btn-copy">📋 複製</button>
        <button class="d-btn" id="cfe-btn-download">💾 下載</button>
        <span class="cfe-feedback" id="cfe-feedback"></span>
      </div>
    </div>
  </div>

  <!-- RIGHT: single preview area -->
  <div class="te-right">
    <div class="preview-toolbar">
      <div class="preview-toggle">
        <button class="preview-btn active" data-preview="window">🪟 視窗</button>
        <button class="preview-btn" data-preview="desktop">🖥 桌面</button>
      </div>
      <!-- Window controls -->
      <div id="window-controls" style="display:flex;align-items:center;gap:6px;margin-left:8px">
        <span style="font-size:11px;color:var(--d-text-dim)">背景：</span>
        <select class="bg-select" id="bg-select-core">
          <option value="bg-dark">深色</option>
          <option value="bg-grid" selected>格線</option>
          <option value="bg-light">淺色</option>
        </select>
      </div>
      <!-- Desktop controls -->
      <div id="desktop-controls" style="display:none;align-items:center;gap:8px;margin-left:8px">
        <span style="font-size:11px;color:var(--d-text-dim)">Dock：</span>
        <select class="bg-select" id="dock-position-select">
          <option value="bottom" selected>底部 ↓</option>
          <option value="top">頂部 ↑</option>
          <option value="left">左側 ←</option>
          <option value="right">右側 →</option>
        </select>
        <label style="font-size:11px;color:var(--d-muted);display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none">
          <input type="checkbox" id="dock-labels-toggle" checked style="cursor:pointer"> 標籤
        </label>
        <span id="desktop-preview-status" style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(239,68,68,.15);color:#fca5a5">載入中…</span>
      </div>
    </div>
    <div class="preview-area">
      <div class="preview-sub active" id="preview-window">
        <div id="core-preview-area" class="bg-grid"></div>
      </div>
      <div class="preview-sub" id="preview-desktop">
        <div id="desktop-preview-area"></div>
      </div>
    </div>
  </div>

</div>

<script src="../../dist/deskpane.umd.js"></script>
<script src="../../dist/deskpane-desktop.umd.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   CORE VAR DEFS
═══════════════════════════════════════════════════════════ */
const CORE_VAR_DEFS = [
  { group: '🖼 Window Frame', vars: [
    { name: '--dp-window-border',          type: 'color', tip: '視窗邊框顏色（未聚焦）' },
    { name: '--dp-window-border-active',   type: 'color', tip: '視窗邊框顏色（聚焦中）' },
    { name: '--dp-window-shadow',          type: 'text',  tip: '視窗陰影（未聚焦）' },
    { name: '--dp-window-shadow-active',   type: 'text',  tip: '視窗陰影（聚焦中）' },
  ]},
  { group: '📌 Header Bar', vars: [
    { name: '--dp-window-header-bg',          type: 'color', tip: '視窗標題列背景色' },
    { name: '--dp-window-header-border',      type: 'color', tip: '標題列底部分隔線色' },
    { name: '--dp-window-title-color',        type: 'color', tip: '標題文字顏色' },
  ]},
  { group: '📐 Layout Header', vars: [
    { name: '--dp-layout-header-bg',     type: 'color', tip: 'BorderLayout / Panel 標頭背景色' },
    { name: '--dp-layout-header-border', type: 'color', tip: 'Layout 標頭底線顏色' },
    { name: '--dp-layout-title-color',   type: 'color', tip: 'Layout 標頭文字顏色' },
  ]},
  { group: '📐 Layout Buttons & Splitter', vars: [
    { name: '--dp-layout-btn-color',        type: 'color', tip: 'collapse/toggle 按鈕圖示顏色' },
    { name: '--dp-layout-btn-hover-bg',     type: 'color', tip: 'collapse/toggle 按鈕 hover 背景' },
    { name: '--dp-layout-splitter-bg',      type: 'color', tip: 'Splitter 軌道顏色' },
    { name: '--dp-layout-splitter-active',  type: 'color', tip: 'Splitter hover / 拖曳中顏色' },
  ]},
  { group: '🔘 Buttons', vars: [
    { name: '--dp-window-btn-color',              type: 'color', tip: '控制按鈕圖示顏色' },
    { name: '--dp-window-btn-hover-bg',           type: 'color', tip: '控制按鈕 hover 背景' },
    { name: '--dp-window-btn-close-hover-bg',     type: 'color', tip: '關閉按鈕 hover 背景' },
    { name: '--dp-window-btn-close-hover-color',  type: 'color', tip: '關閉按鈕 hover 圖示色' },
  ]},
  { group: '📄 Body & Snap', vars: [
    { name: '--dp-window-body-bg',          type: 'color', tip: '視窗內容區背景色' },
    { name: '--dp-window-body-color',       type: 'color', tip: '視窗內容區文字顏色' },
    { name: '--dp-snap-guide-color', type: 'text',  tip: 'Snap 引導線顏色（rgba）' },
  ]},
];

/* ═══════════════════════════════════════════════════════════
   DESKTOP VAR DEFS
═══════════════════════════════════════════════════════════ */
const DESKTOP_VAR_DEFS = [
  { group: '🖥 Desktop Background', vars: [
    { name: '--dp-desktop-bg', type: 'text', tip: '桌面背景，支援 CSS 任意值（色碼、漸層）' },
  ]},
  { group: '🏷 Icon Labels', vars: [
    { name: '--dp-desktop-icon-text', type: 'color', tip: '桌面圖示文字顏色' },
  ]},
  { group: '📦 Dock', vars: [
    { name: '--dp-dock-bg',                type: 'text',  tip: 'Dock 背景，支援 rgba / 漸層（設 transparent 可完全透明）' },
    { name: '--dp-dock-backdrop-filter',   type: 'text',  tip: 'Dock 毛玻璃模糊效果，例如 blur(14px) 或 none' },
    { name: '--dp-dock-border',            type: 'text',  tip: 'Dock 邊框顏色，支援 rgba' },
  ]},
  { group: '🔤 Font', vars: [
    { name: '--dp-font', type: 'text', tip: '全域 font-family（Core + Desktop 共用）' },
  ]},
  { group: '🎨 Hover & Interaction', vars: [
    { name: '--dp-desktop-icon-hover-bg', type: 'text', tip: '桌面圖示 hover 背景（支援 rgba）' },
    { name: '--dp-dock-item-hover-bg',    type: 'text', tip: 'Dock 項目 hover 背景（支援 rgba）' },
  ]},
];

/* ═══════════════════════════════════════════════════════════
   UNIFIED THEME REGISTRY
   Each theme is a flat object containing ALL CSS vars
   (core vars + desktop vars merged together).
═══════════════════════════════════════════════════════════ */
const THEMES = {
  'preset-dark': {
    label: '預設 — 深色', icon: '🌙', group: '預設',
    vars: {
      '--dp-window-border':               '#3a3a4a',
      '--dp-window-border-active':        '#5b8dee',
      '--dp-window-shadow':               '0 4px 24px rgba(0,0,0,0.50)',
      '--dp-window-shadow-active':        '0 8px 36px rgba(0,0,0,0.70)',
      '--dp-window-header-bg':            '#1e1e2e',
      '--dp-layout-header-bg':     '#252535',
      '--dp-layout-header-border': '#3a3a4a',
      '--dp-layout-title-color':   '#c0c0d8',
      '--dp-layout-btn-color':     '#8080a0',
      '--dp-layout-btn-hover-bg':  '#3a3a4a',
      '--dp-layout-splitter-bg':   '#2a2a3a',
      '--dp-layout-splitter-active':'#5b8dee',
      '--dp-window-header-border':        '#3a3a4a',
      '--dp-window-title-color':          '#e0e0f0',
      '--dp-window-btn-color':            '#a0a0b8',
      '--dp-window-btn-hover-bg':         '#3a3a4a',
      '--dp-window-btn-close-hover-bg':   '#ff5f57',
      '--dp-window-btn-close-hover-color':'#ffffff',
      '--dp-window-body-bg':              '#13131f',

/* ── Split helpers ──────────────────────────────────────── */
function themeCorePart(vars) {
  const coreNames = new Set(CORE_VAR_DEFS.flatMap(g => g.vars.map(v => v.name)));
  return Object.fromEntries(Object.entries(vars).filter(([k]) => coreNames.has(k)));
}
function themeDesktopPart(vars) {
  const desktopNames = new Set(DESKTOP_VAR_DEFS.flatMap(g => g.vars.map(v => v.name)));
  return Object.fromEntries(Object.entries(vars).filter(([k]) => desktopNames.has(k)));
}

/* ── Custom themes (localStorage) ──────────────────────── */
const CUSTOM_KEY = 'webos-te-custom-themes';
function loadCustomThemes() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_KEY) || '{}'); } catch { return {}; }
}
function saveCustomThemes(map) {
  localStorage.setItem(CUSTOM_KEY, JSON.stringify(map));
}

/* ── Populate <select> ──────────────────────────────────── */
function populateThemeSelect(currentId) {
  const sel = document.getElementById('theme-select');
  const prev = currentId || sel.value;
  sel.innerHTML = '';
  const groups = {};
  Object.entries(THEMES).forEach(([id, t]) => {
    (groups[t.group] = groups[t.group] || []).push({ id, ...t });
  });
  Object.entries(groups).forEach(([grpName, items]) => {
    const og = document.createElement('optgroup'); og.label = grpName;
    items.forEach(t => {
      const o = document.createElement('option'); o.value = t.id;
      o.textContent = t.icon + ' ' + t.label;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });
  const customs = loadCustomThemes();
  if (Object.keys(customs).length) {
    const og = document.createElement('optgroup'); og.label = '自訂';
    Object.keys(customs).forEach(id => {
      const o = document.createElement('option'); o.value = id;
      o.textContent = '✏️ ' + id;
      og.appendChild(o);
    });
    sel.appendChild(og);
  }
  if (prev) sel.value = prev;
  updateDeleteBtn();
}

function updateDeleteBtn() {
  const sel = document.getElementById('theme-select');
  const isCustom = !!loadCustomThemes()[sel.value];
  document.getElementById('btn-delete-theme').style.display = isCustom ? '' : 'none';
}

/* ── Apply a theme by id ────────────────────────────────── */
function applyTheme(id) {
  let vars;
  if (THEMES[id]) {
    vars = THEMES[id].vars;
  } else {
    const customs = loadCustomThemes();
    if (customs[id]) vars = customs[id].vars;
  }
  if (!vars) return;
  Object.assign(coreValues,    themeCorePart(vars));
  Object.assign(desktopValues, themeDesktopPart(vars));
  applyAllVars(vars);
  syncEditorToValues('var-editor-scroll', CORE_VAR_DEFS,    coreValues);
  syncEditorToValues('var-editor-scroll', DESKTOP_VAR_DEFS, desktopValues);
}

const coreValues    = Object.assign({}, themeCorePart(THEMES['preset-dark'].vars));
const desktopValues = Object.assign({}, themeDesktopPart(THEMES['preset-dark'].vars));

/* ── Helpers ────────────────────────────────────────────── */
function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function colorStrToHex(val) {
  val = val.trim();
  if (/^#[0-9a-fA-F]{3,8}$/.test(val)) {
    let h = val.replace('#','');
    if (h.length===3) h = h.split('').map(c=>c+c).join('');
    return '#' + h.slice(0,6);
  }
  const m = val.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
  if (m) return rgbToHex(+m[1],+m[2],+m[3]);
  return '#888888';
}

function applyVar(name, value) {
  document.documentElement.style.setProperty(name, value);
}
function applyAllVars(obj) { Object.entries(obj).forEach(([n,v]) => applyVar(n,v)); }

/* ── Build editor panel (generic) ───────────────────────── */
function buildEditor(containerId, varDefs, values, append = false) {
  const container = document.getElementById(containerId);
  if (!append) container.innerHTML = '';

  const isColorStr = s => /^#[0-9a-fA-F]{3,8}$/.test(s) || /^rgba?\s*\(/.test(s);
  const parseAlpha = s => { const m = s.match(/rgba?\([^)]+,\s*([\d.]+)\s*\)/); return m ? parseFloat(m[1]) : 1; };
  const buildRgba  = (hexEl, aEl) => {
    const hx = hexEl.value; const r = parseInt(hx.slice(1,3),16), g = parseInt(hx.slice(3,5),16), b = parseInt(hx.slice(5,7),16);
    const a = parseFloat(aEl.value); return `rgba(${r},${g},${b},${isNaN(a)?1:a})`;
  };

  varDefs.forEach(group => {
    const gEl = document.createElement('div'); gEl.className = 'var-group';
    const tEl = document.createElement('div'); tEl.className = 'var-group-title';
    tEl.textContent = group.group; gEl.appendChild(tEl);
    group.vars.forEach(v => {
      const row = document.createElement('div'); row.className = 'var-row';
      const lEl = document.createElement('div'); lEl.className = 'var-label';
      lEl.textContent = v.name; lEl.title = v.tip; row.appendChild(lEl);
      const iEl = document.createElement('div'); iEl.className = 'var-inputs';
      const varId = v.name.replace(/--/g,'').replace(/-/g,'_');

      if (v.type === 'color') {
        const initVal = (values[v.name] || '').trim();
        let fmt = /^rgba?\s*\(/.test(initVal) ? 'rgba' : 'hex';

        const ci = document.createElement('input'); ci.type = 'color';
        ci.id = 'ci-' + varId; ci.value = colorStrToHex(initVal || '#888888');

        const fmtBtn = document.createElement('button');
        fmtBtn.className = 'color-fmt-btn'; fmtBtn.title = '切換 HEX / RGBA';
        fmtBtn.textContent = fmt === 'rgba' ? 'RGBA' : 'HEX';

        const hi = document.createElement('input'); hi.type = 'text';
        hi.id = 'hi-' + varId; hi.spellcheck = false;
        hi.maxLength = 50;

        const ai = document.createElement('input'); ai.type = 'number';
        ai.id = 'ai-' + varId; ai.className = 'alpha-input';
        ai.min = 0; ai.max = 1; ai.step = 0.01; ai.title = '透明度 0–1';
        ai.value = (fmt === 'rgba' ? parseAlpha(initVal) : 1).toFixed(2);

        const applyFmt = () => {
          if (fmt === 'rgba') {
            hi.className = 'rgba-input'; ai.style.display = '';
            hi.value = buildRgba(ci, ai);
          } else {
            hi.className = 'hex-input'; ai.style.display = 'none';
            hi.value = ci.value;
          }
        };
        applyFmt();

        const sync = val => { values[v.name] = val; applyVar(v.name, val); };

        fmtBtn.addEventListener('click', () => {
          fmt = fmt === 'hex' ? 'rgba' : 'hex';
          fmtBtn.textContent = fmt === 'rgba' ? 'RGBA' : 'HEX';
          applyFmt(); sync(hi.value);
        });
        ci.addEventListener('input', () => {
          hi.value = fmt === 'rgba' ? buildRgba(ci, ai) : ci.value;
          sync(hi.value);
        });
        ai.addEventListener('input', () => { hi.value = buildRgba(ci, ai); sync(hi.value); });
        hi.addEventListener('input', () => {
          const val = hi.value.trim();
          if (fmt === 'hex') {
            if (/^#[0-9a-fA-F]{6}$/.test(val)) ci.value = val;
          } else {
            const hex = colorStrToHex(val);
            if (hex !== '#888888') ci.value = hex;
            const m = val.match(/rgba?\([^)]+,\s*([\d.]+)\s*\)/);
            if (m) ai.value = parseFloat(m[1]).toFixed(2);
          }
          sync(val);
        });
        hi.addEventListener('blur', () => {
          if (fmt === 'hex' && /^#/.test(hi.value.trim())) {
            const n = colorStrToHex(hi.value.trim());
            hi.value = n; ci.value = n; sync(n);
          }
        });
        iEl.appendChild(ci); iEl.appendChild(fmtBtn); iEl.appendChild(hi); iEl.appendChild(ai);

      } else {
        /* text type — detect if value looks like a color and add an optional picker */
        const initVal = (values[v.name] || '').trim();
        const looksColor = isColorStr(initVal);

        const ci = document.createElement('input'); ci.type = 'color';
        ci.id = 'ci-' + varId;
        ci.value = looksColor ? colorStrToHex(initVal) : '#888888';
        ci.style.display = looksColor ? '' : 'none';

        const ai = document.createElement('input'); ai.type = 'number';
        ai.id = 'ai-' + varId; ai.className = 'alpha-input';
        ai.min = 0; ai.max = 1; ai.step = 0.01; ai.title = '透明度 0–1';
        ai.value = looksColor ? parseAlpha(initVal).toFixed(2) : '1';
        ai.style.display = looksColor ? '' : 'none';

        const pv = document.createElement('span'); pv.className = 'var-preview';
        pv.id = 'pv-' + varId; pv.style.background = initVal || '';
        pv.style.display = looksColor ? 'none' : '';

        const ti = document.createElement('input'); ti.type = 'text'; ti.className = 'text-input';
        ti.id = 'ti-' + varId; ti.value = initVal; ti.spellcheck = false;

        const syncTi = val => { values[v.name] = val; applyVar(v.name, val); pv.style.background = val; };

        ci.addEventListener('input', () => {
          const val = buildRgba(ci, ai); ti.value = val; syncTi(val);
        });
        ai.addEventListener('input', () => {
          const val = buildRgba(ci, ai); ti.value = val; syncTi(val);
        });
        ti.addEventListener('input', () => {
          const val = ti.value.trim();
          const isCol = isColorStr(val);
          ci.style.display = isCol ? '' : 'none';
          ai.style.display = isCol ? '' : 'none';
          pv.style.display = isCol ? 'none' : '';
          if (isCol) {
            const hex = colorStrToHex(val);
            if (hex !== '#888888') ci.value = hex;
            const m = val.match(/rgba?\([^)]+,\s*([\d.]+)\s*\)/);
            if (m) ai.value = parseFloat(m[1]).toFixed(2);
          }
          syncTi(val);
        });
        iEl.appendChild(ci); iEl.appendChild(ai); iEl.appendChild(pv); iEl.appendChild(ti);
      }
      row.appendChild(iEl); gEl.appendChild(row);
    });
    container.appendChild(gEl);
  });
}

function syncEditorToValues(containerId, varDefs, values) {
  const isColorStr = s => /^#[0-9a-fA-F]{3,8}$/.test(s) || /^rgba?\s*\(/.test(s);
  varDefs.forEach(group => {
    group.vars.forEach(v => {
      const id   = v.name.replace(/--/g,'').replace(/-/g,'_');
      const newVal = (values[v.name] || '').trim();
      const ci = document.getElementById('ci-' + id);
      const hi = document.getElementById('hi-' + id);
      const ai = document.getElementById('ai-' + id);
      if (v.type === 'color') {
        if (!ci || !hi) return;
        const isRgba = /^rgba?\s*\(/.test(newVal);
        const hex    = colorStrToHex(newVal || '#888');
        ci.value = hex;
        /* find the fmt button: first button child of the var-inputs row */
        const fmtBtn = hi.previousElementSibling;
        if (isRgba) {
          hi.className = 'rgba-input'; hi.value = newVal;
          if (fmtBtn && fmtBtn.classList.contains('color-fmt-btn')) fmtBtn.textContent = 'RGBA';
          if (ai) {
            const m = newVal.match(/rgba?\([^)]+,\s*([\d.]+)\s*\)/);
            if (m) ai.value = parseFloat(m[1]).toFixed(2);
            ai.style.display = '';
          }
        } else {
          hi.className = 'hex-input'; hi.value = hex;
          if (fmtBtn && fmtBtn.classList.contains('color-fmt-btn')) fmtBtn.textContent = 'HEX';
          if (ai) ai.style.display = 'none';
        }
      } else {
        const ti = document.getElementById('ti-' + id);
        const pv = document.getElementById('pv-' + id);
        if (!ti) return;
        ti.value = newVal;
        if (pv) pv.style.background = newVal;
        const isCol = isColorStr(newVal);
        if (ci) { ci.style.display = isCol ? '' : 'none'; if (isCol) ci.value = colorStrToHex(newVal); }
        if (ai) {
          ai.style.display = isCol ? '' : 'none';
          if (isCol) { const m = newVal.match(/rgba?\([^)]+,\s*([\d.]+)\s*\)/); if (m) ai.value = parseFloat(m[1]).toFixed(2); }
        }
        if (pv) pv.style.display = isCol ? 'none' : '';
      }
    });
  });
}

function generateCSS(values, label) {
  const lines = ['/* DeskPane — ' + label + ' */', ':root {'];
  Object.entries(values).forEach(([n,v]) => lines.push('  ' + n.padEnd(32) + ': ' + v + ';'));
  lines.push('}');
  return lines.join('\n');
}
function showFeedback(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2500);
}
async function copyCSS(css, fbId) {
  try { await navigator.clipboard.writeText(css); }
  catch { const ta = document.createElement('textarea'); ta.value = css; ta.style.cssText='position:fixed;left:-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  showFeedback(fbId, '✓ 已複製到剪貼簿！');
}
function downloadCSS(css, fname, fbId) {
  const url = URL.createObjectURL(new Blob([css], {type:'text/css'}));
  const a = document.createElement('a'); a.href = url; a.download = fname; a.click(); URL.revokeObjectURL(url);
  if (fbId) showFeedback(fbId, '✓ 下載已開始！');
}

/* Switch active preset button */
function cfeSetPreset(key) {
  document.querySelectorAll('.cfe-preset-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('cfe-preset-' + key);
  if (btn) btn.classList.add('active');
}

/* Load a built-in preset into the editor */
function cfeLoadPreset(key) {
  if (key === 'default') {
    /* Re-fetch the current file and restore it */
    delete cfeOriginals[cfeCurrentKey];
    cfeLoad(cfeCurrentKey).then(() => {
      cfeSetPreset('default');
    });
  } else if (key === 'win11') {
    /* Ensure we're on the core file tab (Win11 preset targets core CSS) */
    if (cfeCurrentKey !== 'core') {
      cfeCurrentKey = 'core';
      document.querySelectorAll('.cfe-file-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('cfe-btn-core').classList.add('active');
    }
    document.getElementById('cfe-textarea').value = CFE_WIN11_CSS;
    cfeUpdateLineNums();

      }, 100);
      return el;
    },
  },
  settings: {
    title: '⚙️ 系統設定', label: '系統設定', icon: '⚙️', width: 360, height: 260,
    make: () => {
      const el = document.createElement('div');
      el.style.cssText = 'padding:18px;font-family:system-ui;font-size:13px';
      el.innerHTML = `
        <h3 style="margin-bottom:14px;font-size:14px">系統設定（預覽）</h3>
        <div style="margin-bottom:14px">
          <label style="display:block;margin-bottom:6px;font-weight:500">工具列位置</label>
          <select style="padding:5px 10px;border-radius:5px;border:1px solid rgba(128,128,128,.3);font-size:13px;background:transparent;color:inherit;cursor:pointer"
                  onchange="if(window.realDesktop)realDesktop.setDockPosition(this.value)">
            <option value="bottom">下方（Bottom）</option>
            <option value="top">上方（Top）</option>
            <option value="left">左側（Left）</option>
            <option value="right">右側（Right）</option>
          </select>
        </div>
        <div>
          <label style="display:block;margin-bottom:6px;font-weight:500">桌面背景</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${['linear-gradient(135deg,#1a2a4a,#0d1b2a)','linear-gradient(135deg,#2d1b4e,#1a0a2e)','linear-gradient(135deg,#0d3b2a,#051a14)','linear-gradient(135deg,#1e1e2e,#12121e)'].map(bg =>
              `<div onclick="(function(bg){var d=document.querySelector('#desktop-preview-area .dp-desktop');if(d)d.style.background=bg})('${bg}')"
                    style="width:44px;height:30px;border-radius:5px;cursor:pointer;border:2px solid rgba(255,255,255,.2);background:${bg}"></div>`
            ).join('')}

      return el;
    },
  },
};

function cfeOpenApp(id) {
  if (!realWm) return;
  const def = CFE_APPS[id];
  if (!def) return;
  realWm.open({
    id: 'cfe-app-' + id,
    title: def.title,
    label: def.label,
    icon: def.icon,
    width: def.width,
    height: def.height,
    resizable: def.resizable,
    slotType: 'dom',
    content: def.make(),
  });
}

/* Inject CSS — each file has its own style tag so both can be active simultaneously.
   Always appendChild to ensure our override stays LAST in <head>, regardless of when
   the Desktop/WindowManager injected their bundle styles. */
function cfeInject(key, css) {
  cfeStyles[key] = css ?? '';
  const id = CFE_STYLE_IDS[key];
  let  el  = document.getElementById(id);
  if (!el) {
    el    = document.createElement('style');
    el.id = id;
  }
  el.textContent = cfeStyles[key];
  document.head.appendChild(el); // moves to end if already in DOM
}

/* Update line numbers */
function cfeUpdateLineNums() {
  const ta     = document.getElementById('cfe-textarea');
  const nums   = document.getElementById('cfe-line-nums');
  const count  = ta.value.split('\n').length;
  let html = '';
  for (let i = 1; i <= count; i++) html += `<span>${i}</span>`;
  nums.innerHTML = html;
  nums.scrollTop = ta.scrollTop;
}

/* Load a CSS file */
async function cfeLoad(key) {
  cfeCurrentKey = key;
  document.querySelectorAll('.cfe-file-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('cfe-btn-' + key).classList.add('active');
  document.getElementById('cfe-status').textContent = '載入中…';

  try {
    let css = cfeOriginals[key];
    if (!css) {
      const res = await fetch(CFE_FILES[key].path);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      css = await res.text();
      cfeOriginals[key] = css;
    }
    document.getElementById('cfe-textarea').value = css;
    cfeUpdateLineNums();
    cfeInject(key, css);
    const lines = css.split('\n').length;
    document.getElementById('cfe-status').textContent = `${lines} 行`;
    showFeedback('cfe-feedback', '');
    cfeSetPreset('default');

    /* Background-prefetch the other file so both inject tags stay active */
    const other = key === 'core' ? 'desktop' : 'core';
    if (!cfeOriginals[other]) {
      fetch(CFE_FILES[other].path).then(r => r.ok ? r.text() : null).then(txt => {
        if (txt) { cfeOriginals[other] = txt; cfeInject(other, txt); }
      }).catch(() => {});
    }
  } catch (e) {
    document.getElementById('cfe-textarea').value = `/* 無法載入 ${CFE_FILES[key].filename}\n   請先執行 npm run build:lib */`;
    document.getElementById('cfe-status').textContent = '載入失敗';
    cfeUpdateLineNums();
  }
}

/* Textarea events */
document.getElementById('cfe-textarea').addEventListener('input', () => {
  cfeUpdateLineNums();
  cfeInject(cfeCurrentKey, document.getElementById('cfe-textarea').value);
  document.getElementById('cfe-line-nums').scrollTop =
    document.getElementById('cfe-textarea').scrollTop;
});

document.getElementById('cfe-btn-apply').addEventListener('click', () => {
  cfeInject(cfeCurrentKey, document.getElementById('cfe-textarea').value);
  showFeedback('cfe-feedback', '✓ 已套用');
});
document.getElementById('cfe-btn-reset').addEventListener('click', () => {
  delete cfeOriginals[cfeCurrentKey];
  cfeLoad(cfeCurrentKey);
  showFeedback('cfe-feedback', '↩ 已重置為預設');
});
document.getElementById('cfe-btn-copy').addEventListener('click', () => {
  copyCSS(document.getElementById('cfe-textarea').value, 'cfe-feedback');
});
document.getElementById('cfe-btn-download').addEventListener('click', () => {
  const css  = document.getElementById('cfe-textarea').value;
  const name = CFE_FILES[cfeCurrentKey].filename;
  downloadCSS(css, name);
  showFeedback('cfe-feedback', '✓ 下載已開始');
});

/* Advanced panel lazy-loads CSS on first visit (mode toggle handler) */
