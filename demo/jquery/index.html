<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskPane — jQuery</title>
  <link rel="stylesheet" href="../shared/base.css" />
  <link id="dp-theme" rel="stylesheet" href="../../dist/themes/dark.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../../dist/deskpane.umd.js"></script>
  <style>
    .d-sidebar { width: 220px; }
    .sidebar-log {
      height: 160px; border-top: 1px solid var(--d-border);
      padding: 8px 10px; overflow-y: auto;
      font-family: monospace; font-size: 10px; flex-shrink: 0;
    }
    .log-line { color: rgba(34,197,94,.85); padding: 1px 0; }
    .log-line.ev-close { color: rgba(239,68,68,.8); }
    .log-line.ev-focus { color: rgba(59,130,246,.85); }
  </style>
</head>
<body>

<header class="dh">
  <a class="dh-back" href="../index.html">← Demo</a>
  <span class="dh-logo">💙</span>
  <span class="dh-title">jQuery</span>
  <span class="dh-badge b-jq">jQuery 3.7</span>
  <div class="dh-sep"></div>
  <div class="dh-actions">
    <button class="d-btn" id="btn-theme">🌙 暗色</button>
    <button class="d-btn" id="btn-destroy">💣 關閉全部</button>
  </div>
</header>

<div class="d-layout">
  <aside class="d-sidebar">
    <div class="d-sidebar-scroll">
      <div class="d-section-title">應用程式</div>
      <button class="d-app-btn" data-app="jq-intro">
        <span class="icon">💙</span><span class="label">jQuery 整合說明</span>
      </button>
      <button class="d-app-btn" data-app="jq-form">
        <span class="icon">📋</span><span class="label">jQuery Form</span>
      </button>
      <button class="d-app-btn" data-app="jq-table">
        <span class="icon">📊</span><span class="label">動態 Table</span>
      </button>
      <button class="d-app-btn" data-app="jq-animate">
        <span class="icon">🎬</span><span class="label">jQuery 動畫</span>
      </button>
    </div>
    <div class="sidebar-log" id="event-log"><div class="log-line">📡 Event Log</div></div>
  </aside>
  <div class="d-canvas" id="canvas"></div>
</div>

<script>
$(function () {
  const { WindowManager, setTheme } = DeskPane;
  const canvas = document.getElementById('canvas');
  const wm = new WindowManager({ container: canvas, isolated: true, snap: true });

  // ── Event Log ──────────────────────────────────────────
  const CLASS = { 'window:closed':'ev-close','window:focused':'ev-focus' };
  ['window:opened','window:closed','window:focused','window:minimized','window:maximized','window:restored'].forEach(ev => {
    wm.events.on(ev, d => {
      const line = $('<div class="log-line">').addClass(CLASS[ev]||'');
      line.text(new Date().toLocaleTimeString('zh-TW',{hour12:false}) + ' ' + ev.replace('window:','') + ' [' + (d?.id||'') + ']');
      $('#event-log').prepend(line);
      if ($('#event-log div').length > 60) $('#event-log div:last').remove();
      refreshDots();
    });
  });

  function refreshDots() {
    const ids = wm.getWindowIds();
    $('.d-app-btn[data-app]').each(function() {
      const id = $(this).data('app');
      const open = ids.includes(id);
      $(this).toggleClass('active', open);
      if (open && !$(this).find('.d-app-dot').length) $(this).append('<span class="d-app-dot"></span>');
      if (!open) $(this).find('.d-app-dot').remove();
    });
  }

  // ── App 內容 ──────────────────────────────────────────
  const APPS = {

    'jq-intro': {
      title: '💙 jQuery 整合說明', width: 480, height: 360, x: 30, y: 20,
      content() {
        return $('<div>').css({padding:'20px',fontFamily:'system-ui',lineHeight:1.8}).html(`
          <h3 style="margin:0 0 10px;color:#4fb3f7;font-size:16px">DeskPane + jQuery</h3>
          <p style="font-size:13px;color:#94a3b8;margin-bottom:12px">使用 UMD bundle，直接透過 <code>window.DeskPane</code> 取得所有 API</p>
          <pre style="background:rgba(255,255,255,0.05);padding:12px;border-radius:8px;font-size:12px;color:#e2e8f0;overflow:auto"><code>&lt;!-- 1. 載入 jQuery --&gt;
&lt;script src="jquery.min.js"&gt;&lt;/script&gt;
&lt;!-- 2. 載入 DeskPane UMD --&gt;
&lt;script src="deskpane.umd.js"&gt;&lt;/script&gt;

&lt;script&gt;
const { WindowManager } = DeskPane;
const wm = new WindowManager();

// 用 jQuery 建立視窗內容
const $body = $(wm.getBodyElement('my-win'));
$body.html('&lt;p&gt;Hello from jQuery!&lt;/p&gt;');
&lt;/script&gt;</code></pre>`);
      }
    },

    'jq-form': {
      title: '📋 jQuery Form', width: 360, height: 380, x: 80, y: 60,
      content() {
        const $wrap = $('<div>').css({padding:'20px'});
        $wrap.html(`
          <style>
            .jq-field { margin-bottom:14px }
            .jq-field label { display:block;font-size:11px;color:#94a3b8;margin-bottom:4px }
            .jq-field input,.jq-field select {
              width:100%;padding:7px 10px;border-radius:6px;
              border:1px solid rgba(255,255,255,0.1);
              background:rgba(255,255,255,0.05);color:#e2e8f0;
              font-size:13px;font-family:system-ui;outline:none;
            }
            .jq-field input:focus,.jq-field select:focus { border-color:#3b82f6; }
            .jq-err { color:#ef4444;font-size:11px;margin-top:3px;display:none }
            .jq-msg { padding:10px;border-radius:6px;background:rgba(34,197,94,.15);
              color:#22c55e;font-size:12px;display:none;margin-top:8px }
          </style>
          <form id="jq-form-inner">
            <div class="jq-field">
              <label>姓名 *</label>
              <input name="name" placeholder="請輸入姓名" />
              <div class="jq-err" data-for="name">姓名不可空白</div>
            </div>
            <div class="jq-field">
              <label>部門 *</label>
              <select name="dept">
                <option value="">-- 請選擇 --</option>
                <option>財務部</option><option>研發部</option><option>業務部</option><option>人資部</option>
              </select>
              <div class="jq-err" data-for="dept">請選擇部門</div>
            </div>
            <div class="jq-field">
              <label>Email</label>
              <input name="email" type="email" placeholder="example@company.com" />
            </div>
            <button type="submit" class="d-btn d-btn-accent" style="width:100%">送出表單</button>
            <div class="jq-msg" id="jq-ok">✅ 表單已送出（jQuery .serialize()）</div>
          </form>`);
        $wrap.find('#jq-form-inner').on('submit', function(e) {
          e.preventDefault();
          let ok = true;
          $(this).find('[name="name"]').each(function() {
            const v = $(this).val().trim();
            const $err = $('[data-for="name"]');
            if (!v) { $err.show(); ok = false; } else { $err.hide(); }
          });
          $(this).find('[name="dept"]').each(function() {
            const v = $(this).val();
            const $err = $('[data-for="dept"]');
            if (!v) { $err.show(); ok = false; } else { $err.hide(); }
          });
          if (ok) {
            const data = $(this).serialize();
            $('#jq-ok').text('✅ 送出：' + decodeURIComponent(data)).show();
          }
        });
        return $wrap[0];
      }
    },

    'jq-table': {
      title: '📊 動態 Table', width: 480, height: 360, x: 130, y: 80,
      content() {
        const $wrap = $('<div>').css({display:'flex',flexDirection:'column',height:'100%',padding:'12px',gap:'8px'});
        $wrap.html(`
          <style>
            .jq-tbl { width:100%;border-collapse:collapse;font-size:12px }
            .jq-tbl th { background:rgba(59,130,246,.2);padding:6px 10px;text-align:left;color:#93c5fd;font-weight:600 }
            .jq-tbl td { padding:5px 10px;border-top:1px solid rgba(255,255,255,0.06);color:#e2e8f0 }
            .jq-tbl tr:hover td { background:rgba(255,255,255,0.03) }
            .del-btn { background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px }
          </style>
          <div style="display:flex;gap:6px">
            <input id="jq-new-name" placeholder="姓名" style="flex:1;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#e2e8f0;font-size:12px" />
            <input id="jq-new-dept" placeholder="部門" style="flex:1;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#e2e8f0;font-size:12px" />
            <button id="jq-add-row" class="d-btn d-btn-accent">+ 新增</button>
          </div>
          <div style="flex:1;overflow-y:auto">
            <table class="jq-tbl">
              <thead><tr><th>#</th><th>姓名</th><th>部門</th><th></th></tr></thead>
              <tbody id="jq-tbody">
                <tr><td>1</td><td>王小明</td><td>研發部</td><td><button class="del-btn">✕</button></td></tr>
                <tr><td>2</td><td>李美花</td><td>財務部</td><td><button class="del-btn">✕</button></td></tr>
              </tbody>
            </table>
          </div>
          <div style="font-size:11px;color:#64748b">透過 jQuery DOM 動態新增 / 刪除列</div>`);
        let seq = 3;
        $wrap.on('click', '#jq-add-row', function() {
          const name = $('#jq-new-name').val().trim();
          const dept = $('#jq-new-dept').val().trim();
          if (!name) return;
          $('#jq-tbody').append(`<tr><td>${seq++}</td><td>${name}</td><td>${dept||'—'}</td><td><button class="del-btn">✕</button></td></tr>`);
          $('#jq-new-name,#jq-new-dept').val('');
        });
        $wrap.on('click', '.del-btn', function() { $(this).closest('tr').remove(); });
        return $wrap[0];
      }
    },

    'jq-animate': {
      title: '🎬 jQuery 動畫', width: 340, height: 300, x: 180, y: 100,
      content() {
        const $wrap = $('<div>').css({padding:'20px',textAlign:'center',fontFamily:'system-ui'});
        $wrap.html(`
          <div id="jq-box" style="width:80px;height:80px;background:#3b82f6;border-radius:12px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px">🎨</div>
          <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
            <button id="jq-fadein"  class="d-btn">fadeIn</button>
            <button id="jq-fadeout" class="d-btn">fadeOut</button>
            <button id="jq-slide"   class="d-btn">slideToggle</button>
            <button id="jq-spin"    class="d-btn">rotate</button>
          </div>
          <p style="margin-top:16px;font-size:11px;color:#64748b">使用 jQuery 動畫操作視窗內的 DOM</p>`);
        $wrap.find('#jq-fadein').click(()  => $wrap.find('#jq-box').fadeIn(400));
        $wrap.find('#jq-fadeout').click(() => $wrap.find('#jq-box').fadeOut(400));
        $wrap.find('#jq-slide').click(()  => $wrap.find('#jq-box').slideToggle(300));
        let deg = 0;
        $wrap.find('#jq-spin').click(() => {
          deg += 90;
          $wrap.find('#jq-box').css({transition:'transform .4s',transform:'rotate('+deg+'deg)'});
        });
        return $wrap[0];
      }
    },
  };

  // ── 開窗 ──────────────────────────────────────────────
  $('.d-app-btn[data-app]').on('click', function() {
    const id = $(this).data('app');
    const app = APPS[id]; if (!app) return;
    wm.open({ id, title: app.title, width: app.width, height: app.height, x: app.x, y: app.y, content: app.content() });
  });

  // ── 主題 / 關閉全部 ───────────────────────────────────
  let dark = true;
  $('#btn-theme').click(function() {
    dark = !dark;
    setTheme(dark ? 'dark' : 'light', { basePath: '../../dist/themes' });
    $(this).text(dark ? '🌙 暗色' : '☀️ 亮色');
  });
  $('#btn-destroy').click(() => { wm.destroy(); refreshDots(); });

  // ── 初始 ──────────────────────────────────────────────
  wm.open({ id: 'jq-intro', title: APPS['jq-intro'].title, width: APPS['jq-intro'].width, height: APPS['jq-intro'].height, x: APPS['jq-intro'].x, y: APPS['jq-intro'].y, content: APPS['jq-intro'].content() });
});
</script>
</body>
</html>
