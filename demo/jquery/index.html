<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebOS-Core — jQuery Demo</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../../dist/webos-core.umd.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a2a4a 0%, #2d4a7a 100%);
      height: 100vh;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════
       左側應用程式 Dock
    ════════════════════════════════════════ */
    #app-dock {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 48px;
      width: 72px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 0;
      z-index: 9997;
      overflow-y: auto;
    }
    .dock-item {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: background 0.15s, transform 0.1s;
      position: relative;
    }
    .dock-item:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.1);
    }
    .dock-item .dock-label {
      font-size: 9px;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
    }
    .dock-item.running::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4fc3f7;
    }
    .dock-separator {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin: 4px 0;
    }

    /* ═══════════════════════════════════════
       下方任務列
    ════════════════════════════════════════ */
    #taskbar {
      position: fixed;
      bottom: 0;
      left: 72px;
      right: 0;
      height: 48px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 10px;
      z-index: 9998;
      overflow-x: auto;
    }
    .task-item {
      height: 34px;
      max-width: 180px;
      min-width: 80px;
      padding: 0 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .task-item:hover { background: rgba(255,255,255,0.2); }
    .task-item.active {
      background: rgba(74,144,226,0.5);
      border-color: rgba(74,144,226,0.8);
    }
    .task-item.minimized {
      opacity: 0.55;
      text-decoration: underline dotted;
    }
    .task-item-icon { font-size: 14px; flex-shrink: 0; }

    /* ═══════════════════════════════════════
       事件 Log
    ════════════════════════════════════════ */
    #event-log {
      position: fixed;
      bottom: 52px;
      left: 4px;
      width: 200px;
      max-height: 180px;
      overflow-y: auto;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      padding: 8px 10px;
      color: #b0ffb0;
      font-size: 10px;
      font-family: monospace;
      z-index: 9997;
    }
    #event-log p { margin: 2px 0; }

    /* ═══════════════════════════════════════
       jQuery 視窗內容樣式
    ════════════════════════════════════════ */
    .jq-content {
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      min-height: 100%;
    }
    .jq-btn {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .jq-btn:hover { background: #357abd; }
    .btn-danger { background: #e53e3e !important; }
    .btn-danger:hover { background: #c53030 !important; }
    .btn-secondary { background: #6c757d !important; }
    .btn-secondary:hover { background: #545b62 !important; }
    .char-count { font-size: 11px; color: #888; margin-top: 4px; margin-bottom: 8px; }

    /* jQuery badge in dock area header */
    .dock-badge {
      font-size: 8px;
      background: rgba(0,119,190,0.6);
      color: #7dd3fc;
      border-radius: 4px;
      padding: 1px 4px;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<!-- 左側應用程式 Dock -->
<div id="app-dock">
  <div style="font-size:18px;color:#fff;margin-bottom:2px;">💙</div>
  <div class="dock-badge">jQuery</div>
  <div class="dock-separator"></div>
  <button class="dock-item" data-app="jq-text">
    📝<span class="dock-label">文字</span>
  </button>
  <button class="dock-item" data-app="jq-form">
    📋<span class="dock-label">表單</span>
  </button>
  <button class="dock-item" data-app="jq-search">
    🔍<span class="dock-label">搜尋</span>
  </button>
  <button class="dock-item" data-app="jq-accord">
    🎨<span class="dock-label">摺疊</span>
  </button>
  <button class="dock-item" data-app="jq-table">
    📊<span class="dock-label">表格</span>
  </button>
  <div class="dock-separator"></div>
  <button class="dock-item" id="dock-destroy" title="關閉全部">
    💣<span class="dock-label">關閉全部</span>
  </button>
</div>

<!-- 下方任務列（動態產生） -->
<div id="taskbar"></div>

<!-- 事件 Log -->
<div id="event-log"><p>📡 Event Log</p></div>

<script>
  const { WindowManager } = WebOS;
  const wm = new WindowManager({ throttleMs: 16, snap: true });

  // ── 事件 Log ──
  const $log = $('#event-log');
  function logEvent(name, data) {
    $log.prepend($('<p>').text('▶ ' + name + ' [' + (data && data.id ? data.id : '') + ']'));
    if ($log.children().length > 40) $log.children().last().remove();
  }

  // ── App 定義 ──
  const APPS = {
    'jq-text':   { icon: '📝', title: '文字編輯器', label: '文字' },
    'jq-form':   { icon: '📋', title: '表單驗證',   label: '表單' },
    'jq-search': { icon: '🔍', title: '即時搜尋',   label: '搜尋' },
    'jq-accord': { icon: '🎨', title: '摺疊面板',   label: '摺疊' },
    'jq-table':  { icon: '📊', title: '資料表格',   label: '表格' },
  };

  // ── 任務列更新 ──
  function updateTaskbar() {
    var $tb = $('#taskbar').empty();
    wm.getWindowIds().forEach(function(id) {
      var state = wm.getState(id);
      if (!state) return;
      var app = APPS[id] || {};
      var $btn = $('<button class="task-item">')
        .html('<span class="task-item-icon">' + (app.icon || '🪟') + '</span><span>' + state.title + '</span>')
        .toggleClass('active', !!state.isActive)
        .toggleClass('minimized', !!state.isMinimized);
      $btn.on('click', (function(winId) {
        return function() {
          var s = wm.getState(winId);
          if (!s) return;
          if (s.isMinimized || !s.isActive) { wm.restore(winId); wm.focus(winId); }
          else { wm.minimize(winId); }
          updateTaskbar();
        };
      })(id));
      $tb.append($btn);
    });
  }

  // ── Dock 更新 ──
  function updateDock() {
    var openIds = new Set(wm.getWindowIds());
    $('.dock-item[data-app]').each(function() {
      $(this).toggleClass('running', openIds.has($(this).data('app')));
    });
  }

  // ══════════════════════════════════════════
  // 視窗內容工廠
  // ══════════════════════════════════════════

  function createTextEditor() {
    var $el = $('<div class="jq-content">');
    $('<label style="display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:600">內容編輯</label>').appendTo($el);
    var $ta = $('<textarea placeholder="在此輸入文字...">').css({
      width: '100%', height: '180px', resize: 'vertical',
      padding: '8px', border: '1px solid #ddd', borderRadius: '4px',
      fontSize: '13px', fontFamily: 'inherit', boxSizing: 'border-box', marginBottom: '4px'
    });
    var $count = $('<div class="char-count">0 字元</div>');
    $ta.on('input', function() { $count.text($(this).val().length + ' 字元'); });
    $el.append($ta).append($count);
    $('<hr style="margin:12px 0;border:none;border-top:1px solid #eee">').appendTo($el);
    var $btnRow = $('<div>').css({ display: 'flex', gap: '8px' });
    $('<button class="jq-btn">📋 複製</button>').on('click', function() {
      navigator.clipboard.writeText($ta.val()).then(function() {});
    }).appendTo($btnRow);
    $('<button class="jq-btn btn-danger">🗑 清除</button>').on('click', function() {
      $ta.val(''); $count.text('0 字元');
    }).appendTo($btnRow);
    $el.append($btnRow);
    return $el[0];
  }

  function createFormWindow() {
    var $el = $('<div class="jq-content">');
    $('<h3 style="margin:0 0 16px;font-size:14px;color:#333">聯絡表單</h3>').appendTo($el);

    function makeField(label, type, ph) {
      return $('<div>').css('marginBottom', '12px').append(
        $('<label>').text(label).css({ display: 'block', fontSize: '12px', color: '#666', marginBottom: '4px', fontWeight: '600' }),
        $('<input>').attr({ type: type, placeholder: ph }).css({
          width: '100%', padding: '8px', border: '1px solid #ddd', borderRadius: '4px',
          fontSize: '13px', boxSizing: 'border-box'
        })
      );
    }

    var $name  = makeField('姓名 *', 'text',   '請輸入姓名');
    var $email = makeField('Email *', 'email', 'example@email.com');
    var $age   = makeField('年齡', 'number', '18');
    var $msg   = $('<div>').css('marginBottom', '12px').append(
      $('<label>').text('訊息').css({ display: 'block', fontSize: '12px', color: '#666', marginBottom: '4px', fontWeight: '600' }),
      $('<textarea placeholder="選填">').css({
        width: '100%', height: '70px', padding: '8px', border: '1px solid #ddd',
        borderRadius: '4px', fontSize: '13px', resize: 'vertical', boxSizing: 'border-box'
      })
    );

    var $result = $('<div>').css({
      marginTop: '12px', padding: '10px', background: '#f0f8ff',
      borderRadius: '4px', fontSize: '12px', display: 'none'
    });

    var $submit = $('<button class="jq-btn">提交</button>').on('click', function() {
      var nameVal  = $name.find('input').val();
      var emailVal = $email.find('input').val();
      $name.find('input').css('borderColor', '#ddd');
      $email.find('input').css('borderColor', '#ddd');
      if (!nameVal) { $name.find('input').css('borderColor', '#e53e3e').focus(); return; }
      if (!emailVal || emailVal.indexOf('@') < 0) { $email.find('input').css('borderColor', '#e53e3e').focus(); return; }
      $result.show().html('✅ 提交成功！<br>姓名: <strong>' + nameVal + '</strong><br>Email: <strong>' + emailVal + '</strong>');
    });

    $el.append($name, $email, $age, $msg, $submit, $result);
    return $el[0];
  }

  function createLiveSearch() {
    var items = ['Apple', 'Banana', 'Cherry', 'Date', 'Elderberry', 'Fig', 'Grape',
                 'Honeydew', 'Kiwi', 'Lemon', 'Mango', 'Nectarine'];
    var $el = $('<div class="jq-content">');
    var $input = $('<input type="text" placeholder="搜尋水果...">').css({
      width: '100%', padding: '8px', border: '1px solid #ddd', borderRadius: '4px',
      fontSize: '13px', marginBottom: '8px', boxSizing: 'border-box'
    });
    var $count = $('<div>').css({ fontSize: '11px', color: '#888', marginBottom: '8px' })
      .text('共 ' + items.length + ' 筆');
    var $list = $('<ul>').css({ listStyle: 'none', padding: '0', margin: '0', maxHeight: '220px', overflowY: 'auto' });

    items.forEach(function(item) {
      $('<li>').css({ padding: '8px 12px', borderBottom: '1px solid #f0f0f0', fontSize: '13px', cursor: 'pointer' })
        .text(item)
        .on('mouseenter', function() { $(this).css('background', '#f5f5f5'); })
        .on('mouseleave', function() { $(this).css('background', ''); })
        .appendTo($list);
    });

    $input.on('input', function() {
      var q = $(this).val().toLowerCase();
      var visible = 0;
      $list.find('li').each(function() {
        var match = $(this).text().toLowerCase().indexOf(q) >= 0;
        $(this).toggle(match);
        if (match) visible++;
      });
      $count.text('顯示 ' + visible + ' / ' + items.length + ' 筆');
    });

    $el.append($input, $count, $list);
    return $el[0];
  }

  function createAccordion() {
    var sections = [
      { title: '📦 什麼是 WebOS-Core？', body: 'WebOS-Core 是一套框架無關的虛擬桌面視窗管理引擎，支援拖曳、縮放、置頂、最小化、最大化及 Snap 吸附對齊等完整功能。' },
      { title: '🧲 Snap 吸附功能', body: '拖曳視窗靠近桌面邊緣或其他視窗邊緣時，會自動吸附對齊，並顯示藍色參考線。預設啟用，可透過 snap: false 關閉。' },
      { title: '🔗 如何與 jQuery 整合？', body: '載入 UMD bundle 後，使用 jQuery 建立視窗內容，並以 wm.getBodyElement(id) 取得視窗 body 元素附加外掛。' },
      { title: '📄 支援哪些框架？', body: '支援純 JavaScript、jQuery、Vue 3、React。核心完全框架無關。' },
      { title: '⚡ 如何安裝？', body: '複製 dist/ 資料夾，或以 <script> 標籤載入 webos-core.umd.js，無需任何建置步驟。' },
    ];

    var $el = $('<div class="jq-content">').css('padding', '0');

    sections.forEach(function(sec, i) {
      var isOpen = i === 0;
      var $header = $('<div>').css({
        padding: '12px 16px',
        background: isOpen ? '#4a90e2' : '#f8f8f8',
        color: isOpen ? '#fff' : '#333',
        cursor: 'pointer',
        borderBottom: '1px solid #e0e0e0',
        fontSize: '13px',
        fontWeight: '600',
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center'
      }).html(sec.title + ' <span class="acc-icon">' + (isOpen ? '▲' : '▼') + '</span>');

      var $body = $('<div>').css({
        padding: isOpen ? '12px 16px' : '0 16px',
        fontSize: '13px',
        lineHeight: '1.6',
        color: '#555',
        background: '#fff',
        borderBottom: '1px solid #e0e0e0',
        overflow: 'hidden',
        maxHeight: isOpen ? '200px' : '0',
        transition: 'max-height 0.3s ease, padding 0.3s ease'
      }).text(sec.body);

      $header.on('click', function() {
        var open = $body.css('maxHeight') !== '0px';
        $el.find('[data-acc-body]').css({ maxHeight: '0', padding: '0 16px' });
        $el.find('[data-acc-header]').css({ background: '#f8f8f8', color: '#333' }).find('.acc-icon').text('▼');
        if (!open) {
          $body.css({ maxHeight: '200px', padding: '12px 16px' });
          $header.css({ background: '#4a90e2', color: '#fff' }).find('.acc-icon').text('▲');
        }
      });

      $header.attr('data-acc-header', '');
      $body.attr('data-acc-body', '');
      $el.append($header, $body);
    });

    return $el[0];
  }

  function createDataTable() {
    var data = [
      { name: '視窗管理器', version: '0.1.0', size: '24 KB', type: 'ES Module' },
      { name: 'UMD Bundle',  version: '0.1.0', size: '26 KB', type: 'Script Tag' },
      { name: 'Vue Adapter', version: '0.1.0', size: '2 KB',  type: 'Vue 3' },
      { name: 'TypeScript 型別', version: '0.1.0', size: '4 KB', type: '宣告檔' },
      { name: 'DOM Renderer', version: '0.1.0', size: '8 KB', type: '核心' },
    ];
    var sortAsc = true;
    var counter = 0;

    var $el = $('<div class="jq-content">').css('padding', '0');
    var $toolbar = $('<div>').css({
      padding: '8px 12px', display: 'flex', gap: '8px',
      background: '#f8f8f8', borderBottom: '1px solid #e0e0e0', alignItems: 'center'
    });
    var $addBtn  = $('<button class="jq-btn" style="font-size:12px;padding:4px 10px">+ 新增列</button>');
    var $sortBtn = $('<button class="jq-btn btn-secondary" style="font-size:12px;padding:4px 10px">⇅ 排序名稱</button>');
    var $filter  = $('<input type="text" placeholder="篩選...">').css({
      flex: '1', padding: '4px 8px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '12px'
    });
    $toolbar.append($addBtn, $sortBtn, $filter);

    var $table = $('<table>').css({ width: '100%', borderCollapse: 'collapse', fontSize: '12px' });
    var $thead  = $('<thead>').append(
      $('<tr>').append(['名稱','版本','大小','類型'].map(function(h) {
        return $('<th>').text(h).css({ padding: '8px 12px', background: '#4a90e2', color: '#fff', textAlign: 'left', fontWeight: '600' });
      }))
    );
    var $tbody = $('<tbody>');

    function renderRows(rows) {
      $tbody.empty();
      rows.forEach(function(row, i) {
        $('<tr>').css({ background: i % 2 === 0 ? '#fff' : '#f9f9f9' })
          .append([row.name, row.version, row.size, row.type].map(function(v) {
            return $('<td>').text(v).css({ padding: '8px 12px', borderBottom: '1px solid #eee' });
          }))
          .appendTo($tbody);
      });
    }

    renderRows(data);
    $table.append($thead, $tbody);

    $sortBtn.on('click', function() {
      sortAsc = !sortAsc;
      data.sort(function(a, b) { return sortAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name); });
      renderRows(data);
      $sortBtn.text('⇅ ' + (sortAsc ? '↑' : '↓') + ' 名稱');
    });

    $addBtn.on('click', function() {
      counter++;
      data.push({ name: '模組 ' + counter, version: '0.x.0', size: (Math.floor(Math.random() * 20) + 1) + ' KB', type: '自訂' });
      renderRows(data);
    });

    $filter.on('input', function() {
      var q = $(this).val().toLowerCase();
      var rows = q ? data.filter(function(r) {
        return Object.values(r).some(function(v) { return v.toLowerCase().indexOf(q) >= 0; });
      }) : data;
      renderRows(rows);
    });

    $el.append($toolbar, $table);
    return $el[0];
  }

  // ── App 設定 ──
  var APP_CONFIGS = {
    'jq-text':   { width: 500, height: 360, factory: createTextEditor },
    'jq-form':   { width: 440, height: 420, factory: createFormWindow },
    'jq-search': { width: 360, height: 360, factory: createLiveSearch },
    'jq-accord': { width: 460, height: 340, factory: createAccordion  },
    'jq-table':  { width: 560, height: 340, factory: createDataTable  },
  };

  function openApp(id) {
    var app = APPS[id];
    var cfg = APP_CONFIGS[id];
    if (!app || !cfg) return;
    wm.open({ id: id, title: app.title, content: cfg.factory(), width: cfg.width, height: cfg.height });
    updateDock();
    updateTaskbar();
  }

  // ── Dock 點擊 ──
  $('#app-dock').on('click', '.dock-item[data-app]', function() {
    openApp($(this).data('app'));
  });

  $('#dock-destroy').on('click', function() {
    wm.destroy();
    updateTaskbar();
    updateDock();
  });

  // ── 事件訂閱 ──
  var syncEvents = [
    'window:opened', 'window:closed', 'window:focused',
    'window:minimized', 'window:maximized', 'window:restored',
    'window:moved', 'window:resized'
  ];
  syncEvents.forEach(function(ev) {
    wm.events.on(ev, function(d) {
      logEvent(ev, d);
      updateTaskbar();
      updateDock();
    });
  });
</script>
</body>
</html>
